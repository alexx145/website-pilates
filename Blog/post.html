<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Artigo... | Camila Cerqueira Studio</title>
    <link rel="icon" type="image/png" href="../icone-verde.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    
    <!-- Marked.js via CDN para converter Markdown para HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        .post-header { padding: 120px 0 40px; text-align: center; }
        .post-title { font-family: var(--font-heading); font-size: clamp(2rem, 4vw, 3rem); color: var(--brown); margin-bottom: 20px; line-height: 1.2; max-width: 800px; margin-inline: auto; }
        .post-cover { width: 100%; max-width: 900px; height: auto; max-height: 500px; object-fit: cover; border-radius: var(--radius-lg); margin: 0 auto 40px; display: block; box-shadow: var(--shadow); }
        .post-content { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; font-size: 1.1rem; line-height: 1.8; color: var(--brown); }
        
        /* Estilização para as tags HTML geradas a partir do Markdown */
        .post-content h2 { font-family: var(--font-heading); font-size: 2rem; margin: 40px 0 20px; color: var(--brown); line-height: 1.3; }
        .post-content h3 { font-family: var(--font-heading); font-size: 1.5rem; margin: 30px 0 16px; color: var(--brown); }
        .post-content p { margin-bottom: 24px; }
        .post-content ul, .post-content ol { margin: 0 0 24px 24px; padding-left: 16px; }
        .post-content li { margin-bottom: 10px; }
        .post-content a { color: var(--green); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--green); transition: var(--transition); }
        .post-content a:hover { color: var(--green-dark); border-color: var(--green-dark); }
        .post-content blockquote { border-left: 4px solid var(--green); padding-left: 20px; font-style: italic; color: var(--brown-light); margin: 32px 0; background: rgba(153,154,133,.05); padding: 20px; border-radius: 0 var(--radius) var(--radius) 0; }
        .post-content img { border-radius: var(--radius); margin: 32px 0; max-width: 100%; height: auto; display: block; }
        .post-content strong { font-weight: 700; color: var(--brown); }
        
        #loading { text-align: center; padding: 100px 20px; color: var(--brown-light); font-size: 1.2rem; }
        .post-container { display: none; }
    </style>
</head>
<body>
    <!-- HEADER ADAPTADO -->
    <header class="header" id="header">
        <div class="container header__inner">
            <a href="../index.html" class="header__logo">
                <img src="../Logo verde lateral.png" alt="Camila Cerqueira" class="header__logo-img">
            </a>
            <nav class="header__nav" id="mainNav">
                <ul class="header__menu">
                    <li><a href="../index.html" class="header__link">Início</a></li>
                    <li><a href="index.html" class="header__link">Blog</a></li>
                </ul>
            </nav>
            <a href="https://wa.me/5531975120312" class="btn btn--primary header__cta" target="_blank" rel="noopener">
                Agendar Aula
            </a>
        </div>
    </header>

    <main>
        <div id="loading">Carregando conteúdo do artigo...</div>
        
        <article class="post-container" id="postContainer">
            <header class="post-header container">
                <h1 class="post-title" id="postTitle">Título do Artigo</h1>
            </header>
            
            <div class="container">
                <img src="" alt="Capa do artigo" class="post-cover" id="postCover" style="display: none;">
            </div>

            <!-- Aqui o marked.js vai injetar o HTML -->
            <div class="post-content" id="postContent"></div>
            
            <!-- CTA estático focado em conversão -->
            <div class="container">
                <section class="cta-section" style="border-radius: var(--radius-lg); margin-bottom: 80px; margin-top: 40px;">
                    <div class="cta-section__inner">
                        <h2 class="cta-section__title">Sente dores e quer melhorar sua qualidade de vida?</h2>
                        <p class="cta-section__text">O método Pilates aliado à fisioterapia pode transformar seu bem-estar. Agende uma avaliação exclusiva e descubra como podemos ajudar você.</p>
                        <a href="https://wa.me/5531975120312?text=Ol%C3%A1%2C%20li%20o%20artigo%20no%20blog%20e%20gostaria%20de%20agendar%20uma%20avalia%C3%A7%C3%A3o!" class="btn btn--primary btn--lg" target="_blank" rel="noopener">
                            Falar no WhatsApp
                        </a>
                    </div>
                </section>
            </div>
        </article>
    </main>

    <script type="module" src="post.js"></script>
</body>
</html>
